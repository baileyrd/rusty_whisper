# Inference is compute-bound; let LLVM use the host's full SIMD width
# (AVX2/AVX-512 where present) instead of the x86-64 SSE2 baseline.
# Scoped per-target so cross-compiles (e.g. wasm) are unaffected.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]
